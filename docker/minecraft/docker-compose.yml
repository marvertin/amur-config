services:
  minecraft:
    image: itzg/minecraft-server:java25
    container_name: minecraft
    restart: unless-stopped
    ports:
      - "25565:25565"
    environment:
      - EULA=TRUE
      - TZ=Europe/Prague
      - TYPE=VANILLA
      - VERSION=LATEST
      - MEMORY=4G
      - ENABLE_ROLLING_LOGS=true
    volumes:
      - ./data:/data